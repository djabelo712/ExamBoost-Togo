<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Logo principal (vectoriel)
     Concept : livre ouvert + mortarboard + étoile + monogramme EB
     Palette : vert Togo #006837 + orange #D97700
     ViewBox : 0 0 200 200 (carré, usage général) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="ExamBoost Togo">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006837"/>
      <stop offset="100%" stop-color="#004A26"/>
    </linearGradient>
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#D97700"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F3F4"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D97700"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
  </defs>

  <!-- Cercle de fond (vert Togo → vert foncé) -->
  <circle cx="100" cy="100" r="92" fill="url(#bgGradient)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.18"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.12"/>

  <!-- Étoile (réussite) au sommet -->
  <polygon points="100,18 103.5,29 114,29 105.5,35.5 109,46 100,39.5 91,46 94.5,35.5 86,29 96.5,29"
           fill="#FFB74D"/>

  <!-- Mortarboard (cap) -->
  <!-- Plateau (losange) -->
  <polygon points="100,52 144,73 100,94 56,73" fill="url(#capGradient)"/>
  <!-- Reflet sur le plateau -->
  <polygon points="100,52 144,73 100,73" fill="#FFFFFF" fill-opacity="0.18"/>
  <!-- Base du cap (dôme sous le plateau) -->
  <path d="M 78,84 Q 78,100 100,102 Q 122,100 122,84 Q 100,92 78,84 Z" fill="#A85200"/>
  <!-- Pompon + cordon -->
  <path d="M 144,73 Q 151,82 149,98 L 147,112" stroke="#FFB74D" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <circle cx="147" cy="114" r="3.8" fill="#FFB74D"/>

  <!-- Flèche ascendante (boost/progression) qui traverse le livre -->
  <path d="M 100,158 L 100,108" stroke="url(#arrowGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-opacity="0.85"/>
  <polygon points="100,104 95,114 105,114" fill="#FFB74D"/>

  <!-- Livre ouvert -->
  <!-- Page gauche -->
  <path d="M 100,114 L 58,122 L 58,160 Q 80,168 100,160 Z" fill="url(#bookGradient)"/>
  <!-- Page droite -->
  <path d="M 100,114 L 142,122 L 142,160 Q 120,168 100,160 Z" fill="url(#bookGradient)"/>
  <!-- Lignes de texte suggérées (page gauche) -->
  <line x1="66" y1="130" x2="92" y2="134" stroke="#006837" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="66" y1="137" x2="92" y2="141" stroke="#006837" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="66" y1="144" x2="88" y2="148" stroke="#006837" stroke-width="1.2" stroke-opacity="0.4"/>
  <!-- Lignes de texte suggérées (page droite) -->
  <line x1="108" y1="134" x2="134" y2="130" stroke="#006837" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="108" y1="141" x2="134" y2="137" stroke="#006837" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="108" y1="148" x2="130" y2="144" stroke="#006837" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Monogramme EB -->
  <text x="100" y="184" font-family="Outfit, Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">EB</text>
</svg>
