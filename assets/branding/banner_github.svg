<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Bannière GitHub (1280x400)
     Fond dégradé vert → orange. Logo à gauche + texte + tags.
     Mention DJANTA Tech Hub 2026. ViewBox : 0 0 1280 400 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="ExamBoost Togo — Bannière">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004A26"/>
      <stop offset="45%" stop-color="#006837"/>
      <stop offset="100%" stop-color="#D97700"/>
    </linearGradient>
    <linearGradient id="capBanner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#D97700"/>
    </linearGradient>
    <linearGradient id="arrowBanner" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D97700"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
  </defs>

  <!-- Fond dégradé -->
  <rect width="1280" height="400" fill="url(#bannerBg)"/>

  <!-- Cercles décoratifs subtils à droite -->
  <circle cx="1100" cy="80" r="140" fill="#FFFFFF" fill-opacity="0.05"/>
  <circle cx="1200" cy="320" r="90" fill="#FFFFFF" fill-opacity="0.06"/>
  <circle cx="980" cy="360" r="60" fill="#FFFFFF" fill-opacity="0.04"/>

  <!-- Logo (centré verticalement, à gauche) — copie conforme du logo principal -->
  <g transform="translate(60, 100)">
    <!-- Cercle de fond -->
    <circle cx="100" cy="100" r="92" fill="#004A26" fill-opacity="0.55" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.35"/>

    <!-- Étoile -->
    <polygon points="100,18 103.5,29 114,29 105.5,35.5 109,46 100,39.5 91,46 94.5,35.5 86,29 96.5,29" fill="#FFB74D"/>

    <!-- Mortarboard -->
    <polygon points="100,52 144,73 100,94 56,73" fill="url(#capBanner)"/>
    <polygon points="100,52 144,73 100,73" fill="#FFFFFF" fill-opacity="0.2"/>
    <path d="M 78,84 Q 78,100 100,102 Q 122,100 122,84 Q 100,92 78,84 Z" fill="#A85200"/>
    <path d="M 144,73 Q 151,82 149,98 L 147,112" stroke="#FFB74D" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="147" cy="114" r="3.8" fill="#FFB74D"/>

    <!-- Flèche ascendante -->
    <path d="M 100,158 L 100,108" stroke="url(#arrowBanner)" stroke-width="3" fill="none" stroke-linecap="round" stroke-opacity="0.95"/>
    <polygon points="100,104 95,114 105,114" fill="#FFB74D"/>

    <!-- Livre ouvert -->
    <path d="M 100,114 L 58,122 L 58,160 Q 80,168 100,160 Z" fill="#FFFFFF"/>
    <path d="M 100,114 L 142,122 L 142,160 Q 120,168 100,160 Z" fill="#FFFFFF"/>
    <line x1="66" y1="130" x2="92" y2="134" stroke="#006837" stroke-width="1.2" stroke-opacity="0.45"/>
    <line x1="66" y1="137" x2="92" y2="141" stroke="#006837" stroke-width="1.2" stroke-opacity="0.45"/>
    <line x1="66" y1="144" x2="88" y2="148" stroke="#006837" stroke-width="1.2" stroke-opacity="0.45"/>
    <line x1="108" y1="134" x2="134" y2="130" stroke="#006837" stroke-width="1.2" stroke-opacity="0.45"/>
    <line x1="108" y1="141" x2="134" y2="137" stroke="#006837" stroke-width="1.2" stroke-opacity="0.45"/>
    <line x1="108" y1="148" x2="130" y2="144" stroke="#006837" stroke-width="1.2" stroke-opacity="0.45"/>

    <!-- EB -->
    <text x="100" y="184" font-family="Outfit, Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">EB</text>
  </g>

  <!-- Titre + slogan -->
  <text x="320" y="160" font-family="Outfit, Inter, Arial, sans-serif" font-size="58" font-weight="700" fill="#FFFFFF">ExamBoost Togo</text>
  <text x="320" y="200" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#FFFFFF" fill-opacity="0.92">Préparation intelligente aux examens nationaux</text>

  <!-- Tags (pills) -->
  <g transform="translate(320, 235)">
    <rect x="0" y="0" width="105" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <text x="52" y="22" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Flutter</text>

    <rect x="120" y="0" width="145" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <text x="192" y="22" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">IA Adaptative</text>

    <rect x="280" y="0" width="125" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <text x="342" y="22" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Offline-first</text>

    <rect x="420" y="0" width="80" height="34" rx="17" fill="#FFB74D" fill-opacity="0.28" stroke="#FFB74D" stroke-opacity="0.6"/>
    <text x="460" y="22" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Togo</text>
  </g>

  <!-- Mention DJANTA -->
  <text x="320" y="318" font-family="Outfit, Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFB74D" letter-spacing="2.5">DJANTA TECH HUB 2026</text>
  <line x1="320" y1="332" x2="580" y2="332" stroke="#FFB74D" stroke-width="1" stroke-opacity="0.55"/>
  <text x="320" y="357" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" fill-opacity="0.75">Idée-Action Challenge — Pitch le 24 juillet 2026</text>

  <!-- Coin inférieur droit — version/code -->
  <text x="1230" y="385" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" text-anchor="end">v1.0 — SmartFarm Togo / AIMS Ghana</text>
</svg>
