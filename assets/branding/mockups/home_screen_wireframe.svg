<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Wireframe écran d'accueil
     Représentation low-fidelity de home_screen.dart.
     Cadre téléphone 360x780. Zones grises + annotations rouges.
     ViewBox : 0 0 480 820 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 820" width="480" height="820" role="img" aria-label="Wireframe Home Screen ExamBoost Togo">
  <defs>
    <linearGradient id="wireHeaderBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#006837"/>
      <stop offset="100%" stop-color="#004A26"/>
    </linearGradient>
  </defs>

  <!-- Fond global -->
  <rect width="480" height="820" fill="#F1F3F4"/>

  <!-- Cadre téléphone -->
  <rect x="60" y="20" width="360" height="780" rx="36" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Encoche -->
  <rect x="200" y="30" width="80" height="18" rx="9" fill="#1A1A1A"/>

  <!-- Status bar -->
  <g>
    <text x="80" y="68" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">09:42</text>
    <rect x="370" y="58" width="22" height="10" rx="2" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <rect x="372" y="60" width="16" height="6" rx="1" fill="#006837"/>
    <text x="350" y="68" font-family="Inter, Arial, sans-serif" font-size="9" fill="#1A1A1A">85%</text>
  </g>

  <!-- Header (avec dégradé vert) -->
  <rect x="60" y="78" width="360" height="120" fill="url(#wireHeaderBg)"/>
  <!-- Avatar cercle -->
  <circle cx="100" cy="120" r="22" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="100" y="126" font-family="Outfit, Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">KD</text>
  <!-- Greeting -->
  <text x="135" y="115" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">Bonjour,</text>
  <text x="135" y="133" font-family="Outfit, Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Kossi D.</text>
  <!-- Niveau badge -->
  <rect x="135" y="142" width="92" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.18"/>
  <text x="181" y="156" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" fill="#FFFFFF" text-anchor="middle">BAC série D</text>
  <!-- Petit logo -->
  <circle cx="390" cy="110" r="16" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="390" y="115" font-family="Outfit, Inter, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">EB</text>

  <!-- Carte progression (dans le header) -->
  <rect x="80" y="158" width="320" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="90" y="178" font-family="Inter, Arial, sans-serif" font-size="10" fill="#FFFFFF" fill-opacity="0.9">Objectif BAC 2026</text>
  <rect x="270" y="170" width="120" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="270" y="170" width="72" height="8" rx="4" fill="#FFB74D"/>
  <text x="392" y="178" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">60%</text>

  <!-- Titre "Que veux-tu faire ?" -->
  <text x="80" y="232" font-family="Outfit, Inter, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">Que veux-tu faire ?</text>
  <text x="80" y="248" font-family="Inter, Arial, sans-serif" font-size="11" fill="#757575">Choisis une activité pour progresser aujourd'hui</text>

  <!-- Carte 1 : Réviser (vert) -->
  <rect x="80" y="268" width="320" height="92" rx="16" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="80" y="268" width="6" height="92" rx="3" fill="#006837"/>
  <!-- Icône livre + cap -->
  <circle cx="116" cy="314" r="22" fill="#E8F5ED"/>
  <polygon points="116,304 130,310 116,316 102,310" fill="#D97700"/>
  <path d="M 108,314 Q 108,322 116,323 Q 124,322 124,314" fill="none" stroke="#A85200" stroke-width="1.5"/>
  <path d="M 116,316 L 116,324" stroke="#D97700" stroke-width="1.5"/>
  <!-- Texte carte 1 -->
  <text x="152" y="298" font-family="Outfit, Inter, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Réviser</text>
  <text x="152" y="316" font-family="Inter, Arial, sans-serif" font-size="11" fill="#757575">12 cartes dues aujourd'hui</text>
  <!-- Badge -->
  <rect x="152" y="326" width="58" height="20" rx="10" fill="#E8F5ED"/>
  <text x="181" y="340" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#006837" text-anchor="middle">SM-2</text>
  <!-- Flèche -->
  <path d="M 380,314 L 388,314 M 384,310 L 388,314 L 384,318" stroke="#006837" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Carte 2 : Simulation (orange) -->
  <rect x="80" y="378" width="320" height="92" rx="16" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="80" y="378" width="6" height="92" rx="3" fill="#D97700"/>
  <!-- Icône chrono -->
  <circle cx="116" cy="424" r="22" fill="#FFF3E0"/>
  <circle cx="116" cy="424" r="12" fill="none" stroke="#D97700" stroke-width="2"/>
  <path d="M 116,418 L 116,424 L 121,427" stroke="#D97700" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Texte carte 2 -->
  <text x="152" y="408" font-family="Outfit, Inter, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Simulation</text>
  <text x="152" y="426" font-family="Inter, Arial, sans-serif" font-size="11" fill="#757575">Examen blanc — BEPC 2h / BAC 4h</text>
  <!-- Badge -->
  <rect x="152" y="436" width="78" height="20" rx="10" fill="#FFF3E0"/>
  <text x="191" y="450" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#D97700" text-anchor="middle">Chronométré</text>
  <!-- Flèche -->
  <path d="M 380,424 L 388,424 M 384,420 L 388,424 L 384,428" stroke="#D97700" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Carte 3 : Dashboard (bleu info) -->
  <rect x="80" y="488" width="320" height="92" rx="16" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="80" y="488" width="6" height="92" rx="3" fill="#1565C0"/>
  <!-- Icône graph -->
  <circle cx="116" cy="534" r="22" fill="#E3F2FD"/>
  <rect x="108" y="528" width="4" height="12" fill="#1565C0"/>
  <rect x="114" y="522" width="4" height="18" fill="#1565C0"/>
  <rect x="120" y="530" width="4" height="10" fill="#1565C0"/>
  <!-- Texte carte 3 -->
  <text x="152" y="518" font-family="Outfit, Inter, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Tableau de bord</text>
  <text x="152" y="536" font-family="Inter, Arial, sans-serif" font-size="11" fill="#757575">Maîtrise BKT + prédiction score</text>
  <!-- Badge -->
  <rect x="152" y="546" width="68" height="20" rx="10" fill="#E3F2FD"/>
  <text x="186" y="560" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#1565C0" text-anchor="middle">BKT 0,72</text>
  <!-- Flèche -->
  <path d="M 380,534 L 388,534 M 384,530 L 388,534 L 384,538" stroke="#1565C0" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Section "Activité récente" -->
  <text x="80" y="612" font-family="Outfit, Inter, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Activité récente</text>
  <text x="380" y="612" font-family="Inter, Arial, sans-serif" font-size="11" fill="#006837" text-anchor="end">Voir tout</text>

  <!-- Items activité récente -->
  <rect x="80" y="624" width="320" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="100" cy="642" r="6" fill="#2E7D32"/>
  <text x="116" y="646" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1A">Mathématiques — 8/10 correctes</text>
  <text x="384" y="646" font-family="Inter, Arial, sans-serif" font-size="10" fill="#757575" text-anchor="end">il y a 2h</text>

  <rect x="80" y="668" width="320" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="100" cy="686" r="6" fill="#D97700"/>
  <text x="116" y="690" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1A">SVT — Carte difficile à revoir</text>
  <text x="384" y="690" font-family="Inter, Arial, sans-serif" font-size="10" fill="#757575" text-anchor="end">il y a 5h</text>

  <!-- Bottom navigation -->
  <rect x="60" y="730" width="360" height="70" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="60" y1="730" x2="420" y2="730" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Item 1 actif -->
  <circle cx="120" cy="755" r="4" fill="#006837"/>
  <text x="120" y="780" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#006837" text-anchor="middle">Accueil</text>
  <!-- Item 2 -->
  <circle cx="200" cy="755" r="4" fill="#BDBDBD"/>
  <text x="200" y="780" font-family="Inter, Arial, sans-serif" font-size="10" fill="#757575" text-anchor="middle">Réviser</text>
  <!-- Item 3 -->
  <circle cx="280" cy="755" r="4" fill="#BDBDBD"/>
  <text x="280" y="780" font-family="Inter, Arial, sans-serif" font-size="10" fill="#757575" text-anchor="middle">Simuler</text>
  <!-- Item 4 -->
  <circle cx="360" cy="755" r="4" fill="#BDBDBD"/>
  <text x="360" y="780" font-family="Inter, Arial, sans-serif" font-size="10" fill="#757575" text-anchor="middle">Profil</text>

  <!-- Annotations (côté gauche, en dehors du téléphone) -->
  <g font-family="Inter, Arial, sans-serif" font-size="10" fill="#C62828">
    <line x1="20" y1="138" x2="55" y2="138" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="10" y="142" font-weight="600">A</text>

    <line x1="20" y1="314" x2="55" y2="314" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="10" y="318" font-weight="600">B</text>

    <line x1="20" y1="424" x2="55" y2="424" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="10" y="428" font-weight="600">C</text>

    <line x1="20" y1="534" x2="55" y2="534" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="10" y="538" font-weight="600">D</text>

    <line x1="20" y1="755" x2="55" y2="755" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="10" y="759" font-weight="600">E</text>
  </g>

  <!-- Légende annotations -->
  <g font-family="Inter, Arial, sans-serif" font-size="9" fill="#1A1A1A">
    <text x="430" y="100" font-weight="600" fill="#C62828">A</text>
    <text x="430" y="116">Header utilisateur</text>
    <text x="430" y="128" fill="#757575">+ progression</text>

    <text x="430" y="280" font-weight="600" fill="#C62828">B</text>
    <text x="430" y="296">Carte Réviser</text>
    <text x="430" y="308" fill="#757575">SM-2 + IRT</text>

    <text x="430" y="390" font-weight="600" fill="#C62828">C</text>
    <text x="430" y="406">Carte Simulation</text>
    <text x="430" y="418" fill="#757575">Examen chrono</text>

    <text x="430" y="500" font-weight="600" fill="#C62828">D</text>
    <text x="430" y="516">Carte Dashboard</text>
    <text x="430" y="528" fill="#757575">BKT + XGBoost</text>

    <text x="430" y="722" font-weight="600" fill="#C62828">E</text>
    <text x="430" y="738">Bottom nav 4 onglets</text>
  </g>

  <!-- Titre du wireframe -->
  <text x="240" y="812" font-family="Outfit, Inter, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Wireframe — Home Screen (360 × 780) — ExamBoost Togo</text>
</svg>
