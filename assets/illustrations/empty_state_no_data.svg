<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Empty state : pas de données
     Graphique vide stylisé (barres à 0), icône loupe + "?". Style minimaliste
     idéal pour empty states "Aucune donnée disponible".
     Palette : vert Togo #006837 + orange #D97700 + blanc.
     ViewBox 0 0 200 200 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Aucune donnée disponible">
  <defs>
    <linearGradient id="bgNoData" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8F5ED"/>
    </linearGradient>
  </defs>

  <!-- Fond dégradé doux -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bgNoData)"/>

  <!-- Cercle décoratif en arrière-plan -->
  <circle cx="100" cy="100" r="78" fill="#FFFFFF" fill-opacity="0.6"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#006837" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="2 4"/>

  <!-- Graphique vide stylisé (barres à 0) -->
  <g transform="translate(100, 110)">
    <!-- Axe horizontal -->
    <line x1="-50" y1="30" x2="50" y2="30" stroke="#006837" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Axe vertical -->
    <line x1="-50" y1="30" x2="-50" y2="-30" stroke="#006837" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Graduations (lignes pointillées horizontales) -->
    <line x1="-50" y1="10" x2="50" y2="10" stroke="#006837" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3"/>
    <line x1="-50" y1="-10" x2="50" y2="-10" stroke="#006837" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3"/>

    <!-- Barres à 0 (bases plates) -->
    <rect x="-40" y="27" width="11" height="3" rx="0.5" fill="#E0E0E0"/>
    <rect x="-25" y="28" width="11" height="2" rx="0.5" fill="#E0E0E0"/>
    <rect x="-10" y="27" width="11" height="3" rx="0.5" fill="#E0E0E0"/>
    <rect x="5" y="28" width="11" height="2" rx="0.5" fill="#E0E0E0"/>
    <rect x="20" y="27" width="11" height="3" rx="0.5" fill="#E0E0E0"/>
    <rect x="35" y="28" width="11" height="2" rx="0.5" fill="#E0E0E0"/>

    <!-- Petit pointillé pour suggérer "rien" -->
    <text x="0" y="-15" font-family="Outfit, Inter, Arial, sans-serif" font-size="9" fill="#757575" text-anchor="middle" opacity="0.6">— données —</text>
  </g>

  <!-- Loupe + "?" (en superposition, en bas à droite) -->
  <g transform="translate(135, 130)">
    <!-- Cercle de la loupe -->
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#D97700" stroke-width="2.4"/>
    <circle cx="0" cy="0" r="18" fill="#FFF3E0"/>
    <!-- Point d'interrogation -->
    <text x="0" y="7" font-family="Outfit, Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#D97700" text-anchor="middle">?</text>
    <!-- Manche de la loupe -->
    <line x1="16" y1="16" x2="28" y2="28" stroke="#D97700" stroke-width="4" stroke-linecap="round"/>
    <!-- Reflet sur le verre de la loupe -->
    <path d="M -10,-10 Q -14,-6 -12,-2" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Petites particules décoratives -->
  <circle cx="40" cy="50" r="2" fill="#FFB74D" opacity="0.7"/>
  <circle cx="165" cy="55" r="2.5" fill="#006837" opacity="0.4"/>
  <circle cx="35" cy="155" r="2" fill="#4CAF7A" opacity="0.6"/>
  <circle cx="160" cy="160" r="2" fill="#D97700" opacity="0.4"/>

  <!-- Étoile décorative -->
  <g transform="translate(45, 80)">
    <polygon points="0,-6 1.5,-2 6,-2 2.4,1 4,6 0,3.5 -4,6 -2.4,1 -6,-2 -1.5,-2" fill="#FFB74D" opacity="0.6"/>
  </g>
</svg>
