<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Empty state : élève en train de lire
     Élève stylisé assis, lisant un livre ouvert. Petit logo ExamBoost flottant
     au-dessus. Style minimaliste idéal pour empty states "Continue à réviser".
     Palette : vert Togo #006837 + orange #D97700 + blanc.
     ViewBox 0 0 200 200 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Continue à réviser">
  <defs>
    <linearGradient id="bgReading" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5ED"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <linearGradient id="capReading" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#D97700"/>
    </linearGradient>
  </defs>

  <!-- Fond radial doux -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bgReading)"/>

  <!-- Cercle décoratif en arrière-plan -->
  <circle cx="100" cy="100" r="80" fill="#FFFFFF" fill-opacity="0.5"/>

  <!-- Petit logo ExamBoost flottant en haut -->
  <g transform="translate(100, 35)">
    <!-- Petit halo -->
    <circle cx="0" cy="0" r="16" fill="#006837" fill-opacity="0.12"/>
    <circle cx="0" cy="0" r="13" fill="#006837"/>
    <!-- Mortarboard mini -->
    <polygon points="0,-6 9,-2 0,2 -9,-2" fill="url(#capReading)"/>
    <!-- Livre mini -->
    <rect x="-7" y="3" width="14" height="6" rx="0.8" fill="#FFFFFF"/>
    <line x1="0" y1="3" x2="0" y2="9" stroke="#006837" stroke-width="0.6"/>
    <!-- Petites étoiles autour -->
    <polygon points="0,-22 1.5,-18 6,-18 2.4,-15.5 4,-11 0,-13.5 -4,-11 -2.4,-15.5 -6,-18 -1.5,-18" fill="#FFB74D" opacity="0.7"/>
  </g>

  <!-- Personnage : élève assis lisant -->
  <g transform="translate(100, 130)">
    <!-- Ombre au sol -->
    <ellipse cx="0" cy="40" rx="42" ry="4" fill="#006837" fill-opacity="0.18"/>

    <!-- Jambes (pliées, position assise) -->
    <!-- Jambe gauche -->
    <path d="M -18,5 L -28,28 L -22,38" stroke="#006837" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Jambe droite -->
    <path d="M 18,5 L 28,28 L 22,38" stroke="#006837" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Chaussures -->
    <ellipse cx="-22" cy="40" rx="6" ry="3" fill="#1A1A1A"/>
    <ellipse cx="22" cy="40" rx="6" ry="3" fill="#1A1A1A"/>

    <!-- Corps (tunique) -->
    <path d="M -22,-15 Q -22,-25 -12,-28 L 12,-28 Q 22,-25 22,-15 L 22,8 Q 0,12 -22,8 Z" fill="#006837"/>
    <!-- Col V -->
    <path d="M -6,-28 L 0,-20 L 6,-28 Z" fill="#FFFFFF"/>
    <!-- Bande décorative (style dashiki) -->
    <rect x="-12" y="-12" width="24" height="3" fill="#D97700"/>
    <rect x="-12" y="-5" width="24" height="1.5" fill="#D97700" fill-opacity="0.5"/>

    <!-- Bras tenant le livre (vers l'avant) -->
    <!-- Bras gauche -->
    <path d="M -18,-12 Q -14,2 -10,12" stroke="#006837" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Bras droit -->
    <path d="M 18,-12 Q 14,2 10,12" stroke="#006837" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Livre ouvert tenu devant -->
    <g transform="translate(0, 14)">
      <!-- Page gauche -->
      <path d="M -16,-3 L 0,-6 L 0,8 L -16,11 Z" fill="#FFFFFF" stroke="#006837" stroke-width="0.8"/>
      <!-- Page droite -->
      <path d="M 16,-3 L 0,-6 L 0,8 L 16,11 Z" fill="#FFFFFF" stroke="#006837" stroke-width="0.8"/>
      <!-- Lignes de texte page gauche -->
      <line x1="-12" y1="0" x2="-3" y2="-1" stroke="#006837" stroke-width="0.6" stroke-opacity="0.5"/>
      <line x1="-12" y1="3" x2="-3" y2="2" stroke="#006837" stroke-width="0.6" stroke-opacity="0.5"/>
      <line x1="-12" y1="6" x2="-5" y2="5" stroke="#006837" stroke-width="0.6" stroke-opacity="0.5"/>
      <!-- Lignes de texte page droite -->
      <line x1="3" y1="-1" x2="12" y2="0" stroke="#006837" stroke-width="0.6" stroke-opacity="0.5"/>
      <line x1="3" y1="2" x2="12" y2="3" stroke="#006837" stroke-width="0.6" stroke-opacity="0.5"/>
      <line x1="3" y1="5" x2="10" y2="6" stroke="#006837" stroke-width="0.6" stroke-opacity="0.5"/>
    </g>

    <!-- Cou -->
    <rect x="-5" y="-36" width="10" height="10" fill="#A0703D"/>
    <!-- Tête inclinée vers le livre -->
    <g transform="translate(0, -45) rotate(12)">
      <circle cx="0" cy="0" r="14" fill="#A0703D"/>
      <!-- Cheveux -->
      <path d="M -13,-2 Q -13,-16 0,-17 Q 13,-16 13,-2 Q 11,-10 0,-10 Q -11,-10 -13,-2 Z" fill="#1A1A1A"/>
      <!-- Yeux baissés (concentration sur la lecture) -->
      <path d="M -6,1 Q -5,2 -4,1" stroke="#1A1A1A" stroke-width="1" fill="none" stroke-linecap="round"/>
      <path d="M 4,1 Q 5,2 6,1" stroke="#1A1A1A" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Léger sourire -->
      <path d="M -3,7 Q 0,9 3,7" stroke="#1A1A1A" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Petites particules (réussite/boost) -->
  <circle cx="35" cy="60" r="2" fill="#FFB74D" opacity="0.7"/>
  <circle cx="170" cy="80" r="2.5" fill="#D97700" opacity="0.5"/>
  <circle cx="160" cy="50" r="1.5" fill="#4CAF7A" opacity="0.8"/>
  <circle cx="30" cy="120" r="2" fill="#4CAF7A" opacity="0.6"/>
</svg>
