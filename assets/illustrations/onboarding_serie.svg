<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Onboarding étape 4 : Série
     5 cartes pour les séries (A, B, C, D, F) avec mini-icônes thématiques :
     A = livre (lettres), B = graphique (sciences éco), C = formule maths,
     D = atome (sciences), F = légume/feuille (SVT/agronomie).
     Palette : vert Togo #006837 + orange #D97700 + blanc.
     Style : flat design moderne. ViewBox 0 0 400 300 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Choisis ta série">
  <defs>
    <linearGradient id="bgSerie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5ED"/>
    </linearGradient>
    <linearGradient id="cardSerieActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#006837"/>
      <stop offset="100%" stop-color="#004A26"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="400" height="300" fill="url(#bgSerie)"/>

  <!-- Particules décoratives -->
  <circle cx="35" cy="40" r="3" fill="#FFB74D" fill-opacity="0.6"/>
  <circle cx="375" cy="60" r="4" fill="#006837" fill-opacity="0.4"/>
  <circle cx="60" cy="240" r="5" fill="#D97700" fill-opacity="0.3"/>

  <!-- Titre -->
  <text x="200" y="40" font-family="Outfit, Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#006837" text-anchor="middle">Ta série au BAC</text>
  <line x1="175" y1="48" x2="225" y2="48" stroke="#D97700" stroke-width="2" stroke-linecap="round"/>

  <!-- Carte Série A (Lettres & Philosophie) -->
  <g transform="translate(25, 80)">
    <rect x="0" y="0" width="65" height="115" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Icône : livre ouvert -->
    <g transform="translate(32.5, 40)">
      <path d="M -16,-8 L 0,-12 L 16,-8 L 16,10 L 0,14 L -16,10 Z" fill="#4CAF7A"/>
      <line x1="0" y1="-12" x2="0" y2="14" stroke="#FFFFFF" stroke-width="1.4"/>
      <line x1="-12" y1="-4" x2="-4" y2="-5.5" stroke="#FFFFFF" stroke-width="0.9"/>
      <line x1="-12" y1="0" x2="-4" y2="-1.5" stroke="#FFFFFF" stroke-width="0.9"/>
      <line x1="4" y1="-5.5" x2="12" y2="-4" stroke="#FFFFFF" stroke-width="0.9"/>
      <line x1="4" y1="-1.5" x2="12" y2="0" stroke="#FFFFFF" stroke-width="0.9"/>
    </g>
    <text x="32.5" y="80" font-family="Outfit, Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#006837" text-anchor="middle">A</text>
    <text x="32.5" y="98" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">Lettres</text>
    <text x="32.5" y="108" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">Philosophie</text>
  </g>

  <!-- Carte Série B (Sciences Économiques) -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="65" height="115" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Icône : graphique barres -->
    <g transform="translate(32.5, 40)">
      <line x1="-15" y1="12" x2="15" y2="12" stroke="#1A1A1A" stroke-width="1"/>
      <rect x="-12" y="2" width="5" height="10" fill="#D97700"/>
      <rect x="-3" y="-6" width="5" height="18" fill="#FFB74D"/>
      <rect x="6" y="-2" width="5" height="14" fill="#D97700"/>
      <!-- Flèche de progression -->
      <path d="M -10,-2 L 8,-12" stroke="#006837" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <polygon points="8,-12 5,-10 7,-8" fill="#006837"/>
    </g>
    <text x="32.5" y="80" font-family="Outfit, Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#006837" text-anchor="middle">B</text>
    <text x="32.5" y="98" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">Sciences</text>
    <text x="32.5" y="108" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">Économiques</text>
  </g>

  <!-- Carte Série C (Sciences Maths) — sélectionnée -->
  <g transform="translate(175, 75)">
    <rect x="2" y="4" width="65" height="115" rx="10" fill="#006837" fill-opacity="0.18"/>
    <rect x="0" y="0" width="65" height="115" rx="10" fill="url(#cardSerieActive)"/>
    <rect x="0" y="0" width="65" height="115" rx="10" fill="none" stroke="#D97700" stroke-width="2"/>
    <!-- Icône : formule maths (√ et π) -->
    <g transform="translate(32.5, 40)">
      <text x="0" y="4" font-family="Times New Roman, serif" font-size="16" font-weight="700" fill="#FFB74D" text-anchor="middle">πr²</text>
      <path d="M -14,8 Q -12,2 -8,2 L -8,12" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <text x="0" y="14" font-family="Times New Roman, serif" font-size="9" fill="#FFFFFF" text-anchor="middle">x² + y²</text>
    </g>
    <text x="32.5" y="80" font-family="Outfit, Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">C</text>
    <text x="32.5" y="98" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#FFB74D" text-anchor="middle">Sciences</text>
    <text x="32.5" y="108" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#FFB74D" text-anchor="middle">Maths</text>
    <!-- Badge sélection -->
    <circle cx="54" cy="12" r="8" fill="#FFB74D"/>
    <path d="M 50,12 L 53,15 L 58,9" stroke="#006837" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Carte Série D (Sciences Expérimentales) -->
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="65" height="115" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Icône : atome -->
    <g transform="translate(32.5, 40)">
      <circle cx="0" cy="0" r="3" fill="#D97700"/>
      <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#006837" stroke-width="1.2"/>
      <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#006837" stroke-width="1.2" transform="rotate(60 0 0)"/>
      <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#006837" stroke-width="1.2" transform="rotate(-60 0 0)"/>
      <circle cx="14" cy="0" r="1.8" fill="#FFB74D"/>
      <circle cx="-7" cy="12" r="1.8" fill="#FFB74D"/>
      <circle cx="-7" cy="-12" r="1.8" fill="#FFB74D"/>
    </g>
    <text x="32.5" y="80" font-family="Outfit, Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#006837" text-anchor="middle">D</text>
    <text x="32.5" y="98" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">Sciences</text>
    <text x="32.5" y="108" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">Expériment.</text>
  </g>

  <!-- Carte Série F (F1, F2, F3 — Tech & Agronomie) -->
  <g transform="translate(325, 80)">
    <rect x="0" y="0" width="55" height="115" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Icône : feuille (agronomie) -->
    <g transform="translate(27.5, 40)">
      <path d="M 0,-12 Q -10,-8 -10,4 Q -10,12 0,12 Q 10,12 10,4 Q 10,-8 0,-12 Z" fill="#4CAF7A"/>
      <path d="M 0,-10 L 0,12" stroke="#006837" stroke-width="1"/>
      <path d="M 0,-4 Q -5,-3 -7,0" stroke="#006837" stroke-width="0.7" fill="none"/>
      <path d="M 0,-4 Q 5,-3 7,0" stroke="#006837" stroke-width="0.7" fill="none"/>
      <path d="M 0,2 Q -5,3 -7,6" stroke="#006837" stroke-width="0.7" fill="none"/>
      <path d="M 0,2 Q 5,3 7,6" stroke="#006837" stroke-width="0.7" fill="none"/>
    </g>
    <text x="27.5" y="80" font-family="Outfit, Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#006837" text-anchor="middle">F</text>
    <text x="27.5" y="98" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">Séries F</text>
    <text x="27.5" y="108" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" fill="#757575" text-anchor="middle">(Tech/Agro)</text>
  </g>

  <!-- Indicateur étape 4/5 -->
  <g transform="translate(370, 25)">
    <circle cx="0" cy="0" r="14" fill="#FFFFFF" stroke="#006837" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Outfit, Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#006837" text-anchor="middle">4</text>
  </g>

  <!-- Petit personnage mascotte en bas (regardant les cartes) -->
  <g transform="translate(200, 250)">
    <ellipse cx="0" cy="20" rx="35" ry="4" fill="#000000" fill-opacity="0.08"/>
    <!-- Tête souriante -->
    <circle cx="0" cy="0" r="14" fill="#A0703D"/>
    <path d="M -13,-2 Q -13,-14 0,-15 Q 13,-14 13,-2 Q 11,-9 0,-9 Q -11,-9 -13,-2 Z" fill="#1A1A1A"/>
    <circle cx="-5" cy="0" r="1.3" fill="#1A1A1A"/>
    <circle cx="5" cy="0" r="1.3" fill="#1A1A1A"/>
    <path d="M -4,6 Q 0,9 4,6" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Mains levées (choix en cours) -->
    <circle cx="-22" cy="8" r="4" fill="#A0703D"/>
    <circle cx="22" cy="8" r="4" fill="#A0703D"/>
    <path d="M -22,8 L -22,18" stroke="#A0703D" stroke-width="3" stroke-linecap="round"/>
    <path d="M 22,8 L 22,18" stroke="#A0703D" stroke-width="3" stroke-linecap="round"/>
    <rect x="-12" y="14" width="24" height="6" fill="#006837"/>
  </g>
</svg>
