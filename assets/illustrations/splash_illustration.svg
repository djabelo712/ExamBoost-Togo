<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Splash screen illustration
     Logo ExamBoost au centre (grand, ~60% de l'espace), tagline sous le logo,
     particules animées (petites étoiles vertes/oranges), fond dégradé
     vert Togo → vert foncé. Format portrait.
     Palette : vert Togo #006837 + vert foncé #004A26 + orange #D97700 + #FFB74D.
     ViewBox 0 0 400 600 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600" role="img" aria-label="ExamBoost Togo — splash screen">
  <defs>
    <!-- Dégradé de fond vertical (vert Togo → vert foncé) -->
    <linearGradient id="bgSplash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#006837"/>
      <stop offset="100%" stop-color="#004A26"/>
    </linearGradient>
    <!-- Dégradé du plateau mortarboard -->
    <linearGradient id="splashCap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#D97700"/>
    </linearGradient>
    <!-- Dégradé du livre -->
    <linearGradient id="splashBook" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F3F4"/>
    </linearGradient>
    <!-- Dégradé de la flèche (boost) -->
    <linearGradient id="splashArrow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D97700"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <!-- Halo radial derrière le logo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond dégradé vert -->
  <rect x="0" y="0" width="400" height="600" fill="url(#bgSplash)"/>

  <!-- Halo lumineux derrière le logo -->
  <circle cx="200" cy="240" r="160" fill="url(#halo)"/>

  <!-- Particules animées (petites étoiles vertes/oranges) -->
  <!-- Définition d'une étoile réutilisable -->
  <defs>
    <symbol id="spark" viewBox="-10 -10 20 20">
      <polygon points="0,-8 2,-2 8,-2 3,1.5 5,8 0,4 -5,8 -3,1.5 -8,-2 -2,-2" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Particules dispersées (positions variées + tailles variées) -->
  <g>
    <!-- Particules vertes (claires) -->
    <use href="#spark" x="40" y="60" width="14" height="14" color="#4CAF7A" opacity="0.85"/>
    <use href="#spark" x="340" y="90" width="12" height="12" color="#4CAF7A" opacity="0.7"/>
    <use href="#spark" x="55" y="380" width="10" height="10" color="#4CAF7A" opacity="0.6"/>
    <use href="#spark" x="350" y="450" width="13" height="13" color="#4CAF7A" opacity="0.75"/>
    <use href="#spark" x="70" y="500" width="11" height="11" color="#4CAF7A" opacity="0.65"/>
    <use href="#spark" x="320" y="200" width="9" height="9" color="#4CAF7A" opacity="0.7"/>

    <!-- Particules oranges -->
    <use href="#spark" x="50" y="180" width="16" height="16" color="#FFB74D" opacity="0.9"/>
    <use href="#spark" x="340" y="320" width="14" height="14" color="#FFB74D" opacity="0.85"/>
    <use href="#spark" x="60" y="280" width="12" height="12" color="#D97700" opacity="0.7"/>
    <use href="#spark" x="345" y="540" width="13" height="13" color="#FFB74D" opacity="0.85"/>
    <use href="#spark" x="85" y="555" width="11" height="11" color="#D97700" opacity="0.7"/>
    <use href="#spark" x="310" y="540" width="10" height="10" color="#FFB74D" opacity="0.7"/>
    <use href="#spark" x="30" y="250" width="9" height="9" color="#FFB74D" opacity="0.6"/>
    <use href="#spark" x="365" y="160" width="11" height="11" color="#D97700" opacity="0.65"/>

    <!-- Petits points décoratifs (poussière) -->
    <circle cx="100" cy="120" r="2" fill="#FFFFFF" fill-opacity="0.5"/>
    <circle cx="290" cy="150" r="2.5" fill="#FFFFFF" fill-opacity="0.55"/>
    <circle cx="120" cy="450" r="2" fill="#FFFFFF" fill-opacity="0.5"/>
    <circle cx="280" cy="500" r="2.5" fill="#FFFFFF" fill-opacity="0.6"/>
    <circle cx="380" cy="400" r="2" fill="#FFFFFF" fill-opacity="0.45"/>
    <circle cx="20" cy="430" r="2" fill="#FFFFFF" fill-opacity="0.4"/>
  </g>

  <!-- Logo ExamBoost central (grand, ~60% de la largeur) -->
  <g transform="translate(200, 240)">
    <!-- Cercle de fond avec bordure -->
    <circle cx="0" cy="0" r="135" fill="#006837"/>
    <circle cx="0" cy="0" r="135" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.22"/>
    <circle cx="0" cy="0" r="123" fill="none" stroke="#FFFFFF" stroke-width="0.9" stroke-opacity="0.14"/>

    <!-- Étoile (réussite) au sommet -->
    <polygon points="0,-100 6,-78 28,-78 10,-65 16,-43 0,-57 -16,-43 -10,-65 -28,-78 -6,-78"
             fill="#FFB74D"/>

    <!-- Mortarboard (cap) -->
    <!-- Plateau (losange) -->
    <polygon points="0,-50 70,0 0,50 -70,0" fill="url(#splashCap)"/>
    <!-- Reflet sur le plateau -->
    <polygon points="0,-50 70,0 0,0" fill="#FFFFFF" fill-opacity="0.2"/>
    <!-- Base du cap (dôme) -->
    <path d="M -28,18 Q -28,45 0,50 Q 28,45 28,18 Q 0,30 -28,18 Z" fill="#A85200"/>
    <!-- Pompon + cordon -->
    <path d="M 70,0 Q 80,15 76,40 L 73,62" stroke="#FFB74D" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="73" cy="65" r="6" fill="#FFB74D"/>

    <!-- Flèche ascendante (boost) -->
    <path d="M 0,108 L 0,30" stroke="url(#splashArrow)" stroke-width="4" fill="none" stroke-linecap="round" stroke-opacity="0.9"/>
    <polygon points="0,24 -8,40 8,40" fill="#FFB74D"/>

    <!-- Livre ouvert -->
    <!-- Page gauche -->
    <path d="M 0,40 L -56,50 L -56,108 Q -28,118 0,108 Z" fill="url(#splashBook)"/>
    <!-- Page droite -->
    <path d="M 0,40 L 56,50 L 56,108 Q 28,118 0,108 Z" fill="url(#splashBook)"/>
    <!-- Lignes de texte suggérées -->
    <line x1="-46" y1="62" x2="-12" y2="66" stroke="#006837" stroke-width="1.6" stroke-opacity="0.45"/>
    <line x1="-46" y1="72" x2="-12" y2="76" stroke="#006837" stroke-width="1.6" stroke-opacity="0.45"/>
    <line x1="-46" y1="82" x2="-18" y2="85" stroke="#006837" stroke-width="1.6" stroke-opacity="0.45"/>
    <line x1="12" y1="66" x2="46" y2="62" stroke="#006837" stroke-width="1.6" stroke-opacity="0.45"/>
    <line x1="12" y1="76" x2="46" y2="72" stroke="#006837" stroke-width="1.6" stroke-opacity="0.45"/>
    <line x1="12" y1="85" x2="40" y2="82" stroke="#006837" stroke-width="1.6" stroke-opacity="0.45"/>

    <!-- Monogramme EB -->
    <text x="0" y="128" font-family="Outfit, Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">EB</text>
  </g>

  <!-- Tagline : "ExamBoost Togo" -->
  <text x="200" y="450" font-family="Outfit, Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">ExamBoost Togo</text>

  <!-- Sous-tagline : "Préparation intelligente aux examens nationaux" -->
  <text x="200" y="490" font-family="Outfit, Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle">Préparation intelligente</text>
  <text x="200" y="512" font-family="Outfit, Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle">aux examens nationaux</text>

  <!-- Indicateur de chargement (barre de progression stylisée) -->
  <g transform="translate(200, 560)">
    <!-- Track -->
    <rect x="-80" y="-2.5" width="160" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.2"/>
    <!-- Progression orange -->
    <rect x="-80" y="-2.5" width="100" height="5" rx="2.5" fill="#FFB74D"/>
    <!-- Point lumineux en bout de barre -->
    <circle cx="20" cy="0" r="3.5" fill="#FFB74D"/>
  </g>

  <!-- Texte "Chargement..." -->
  <text x="200" y="585" font-family="Outfit, Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Chargement...</text>
</svg>
