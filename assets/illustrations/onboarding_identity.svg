<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Onboarding étape 2 : Identité
     Élève remplissant un formulaire (champs nom, prénom, établissement),
     curseur stylisé, ambiance sobre (fond blanc + accents vert/orange).
     Palette : vert Togo #006837 + orange #D97700 + blanc.
     Style : flat design moderne. ViewBox 0 0 400 300 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Renseigne ton identité">
  <defs>
    <linearGradient id="formHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#006837"/>
      <stop offset="100%" stop-color="#4CAF7A"/>
    </linearGradient>
  </defs>

  <!-- Fond blanc -->
  <rect x="0" y="0" width="400" height="300" fill="#F8F9FA"/>

  <!-- Petits accents décoratifs (sobres) -->
  <circle cx="40" cy="40" r="22" fill="#E8F5ED"/>
  <circle cx="370" cy="260" r="28" fill="#FFF3E0"/>
  <circle cx="350" cy="50" r="6" fill="#D97700" fill-opacity="0.4"/>

  <!-- Grande fiche formulaire (carte centrale) -->
  <g transform="translate(110, 50)">
    <!-- Ombre portée -->
    <rect x="2" y="6" width="200" height="210" rx="12" fill="#000000" fill-opacity="0.06"/>
    <!-- Carte blanche -->
    <rect x="0" y="0" width="200" height="210" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Bandeau d'en-tête vert -->
    <rect x="0" y="0" width="200" height="34" rx="12" fill="url(#formHeader)"/>
    <rect x="0" y="22" width="200" height="12" fill="url(#formHeader)"/>
    <!-- Icône utilisateur dans l'en-tête -->
    <circle cx="22" cy="17" r="6" fill="#FFFFFF"/>
    <path d="M 14,28 Q 14,22 22,22 Q 30,22 30,28 Z" fill="#FFFFFF"/>
    <text x="40" y="22" font-family="Outfit, Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Mon identité</text>

    <!-- Champ 1 : Prénom -->
    <text x="16" y="58" font-family="Outfit, Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#757575">Prénom</text>
    <rect x="16" y="64" width="168" height="22" rx="5" fill="#F1F3F4" stroke="#006837" stroke-width="1.2"/>
    <text x="24" y="79" font-family="Outfit, Inter, Arial, sans-serif" font-size="10" fill="#1A1A1A">Awa</text>
    <!-- Curseur clignotant stylisé (barre orange) -->
    <rect x="46" y="68" width="1.6" height="14" fill="#D97700"/>

    <!-- Champ 2 : Nom -->
    <text x="16" y="100" font-family="Outfit, Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#757575">Nom</text>
    <rect x="16" y="106" width="168" height="22" rx="5" fill="#F1F3F4" stroke="#E0E0E0" stroke-width="1"/>
    <text x="24" y="121" font-family="Outfit, Inter, Arial, sans-serif" font-size="10" fill="#1A1A1A">Lawson</text>

    <!-- Champ 3 : Établissement -->
    <text x="16" y="142" font-family="Outfit, Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#757575">Établissement</text>
    <rect x="16" y="148" width="168" height="22" rx="5" fill="#F1F3F4" stroke="#E0E0E0" stroke-width="1"/>
    <text x="24" y="163" font-family="Outfit, Inter, Arial, sans-serif" font-size="10" fill="#757575">Lycée de Tokoin</text>

    <!-- Champ 4 : Ville -->
    <text x="16" y="184" font-family="Outfit, Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#757575">Ville</text>
    <rect x="16" y="190" width="168" height="22" rx="5" fill="#F1F3F4" stroke="#E0E0E0" stroke-width="1"/>
    <text x="24" y="205" font-family="Outfit, Inter, Arial, sans-serif" font-size="10" fill="#757575">Lomé</text>
  </g>

  <!-- Personnage élève (à droite, pointant du doigt vers le formulaire) -->
  <g transform="translate(320, 200)">
    <!-- Ombre -->
    <ellipse cx="0" cy="65" rx="40" ry="5" fill="#000000" fill-opacity="0.08"/>
    <!-- Corps -->
    <path d="M -28,5 Q -28,-8 -16,-12 L 16,-12 Q 28,-8 28,5 L 32,60 Q 0,68 -32,60 Z" fill="#006837"/>
    <!-- Col V -->
    <path d="M -7,-12 L 0,-2 L 7,-12 Z" fill="#FFFFFF"/>
    <!-- Bras gauche (pointe vers la fiche) -->
    <path d="M -22,0 Q -50,5 -75,15" stroke="#006837" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Main gauche (index pointé) -->
    <circle cx="-78" cy="16" r="6" fill="#A0703D"/>
    <rect x="-86" y="14" width="6" height="3" rx="1.5" fill="#A0703D"/>
    <!-- Bras droit le long du corps -->
    <path d="M 22,5 Q 28,30 24,55" stroke="#006837" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Cou -->
    <rect x="-5" y="-22" width="10" height="14" fill="#A0703D"/>
    <!-- Tête -->
    <circle cx="0" cy="-34" r="18" fill="#A0703D"/>
    <!-- Cheveux courts -->
    <path d="M -16,-36 Q -16,-50 0,-52 Q 16,-50 16,-36 Q 14,-44 0,-44 Q -14,-44 -16,-36 Z" fill="#1A1A1A"/>
    <!-- Yeux concentrés -->
    <circle cx="-6" cy="-34" r="1.4" fill="#1A1A1A"/>
    <circle cx="6" cy="-34" r="1.4" fill="#1A1A1A"/>
    <!-- Sourire léger -->
    <path d="M -4,-28 Q 0,-25 4,-28" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Stylo stylisé flottant près du formulaire -->
  <g transform="translate(280, 110) rotate(45)">
    <rect x="-2.5" y="-14" width="5" height="22" fill="#D97700"/>
    <rect x="-2.5" y="-14" width="5" height="5" fill="#FFB74D"/>
    <polygon points="-2.5,8 2.5,8 0,14" fill="#1A1A1A"/>
  </g>

  <!-- Indicateur visuel "étape 2/5" discret en haut à droite -->
  <g transform="translate(360, 25)">
    <circle cx="0" cy="0" r="14" fill="#FFFFFF" stroke="#006837" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Outfit, Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#006837" text-anchor="middle">2</text>
  </g>
</svg>
