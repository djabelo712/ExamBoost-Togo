<?xml version="1.0" encoding="UTF-8"?>
<!-- ExamBoost Togo — Onboarding étape 5 : Matières préférées
     6 icônes matières disposées en cercle autour du logo ExamBoost :
     Maths (√), Français (livre), Sciences (atome), SVT (fleur),
     Histoire-Géo (globe), Anglais (drapeau UK).
     Palette : vert Togo #006837 + orange #D97700 + blanc.
     Style : flat design moderne. ViewBox 0 0 400 300 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Choisis tes matières préférées">
  <defs>
    <radialGradient id="bgSubjects" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#E8F5ED"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </radialGradient>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006837"/>
      <stop offset="100%" stop-color="#004A26"/>
    </linearGradient>
    <linearGradient id="logoCap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#D97700"/>
    </linearGradient>
  </defs>

  <!-- Fond radial doux -->
  <rect x="0" y="0" width="400" height="300" fill="url(#bgSubjects)"/>

  <!-- Cercle guide discret (liaison visuelle) -->
  <circle cx="200" cy="150" r="115" fill="none" stroke="#006837" stroke-width="0.8" stroke-opacity="0.18" stroke-dasharray="3 5"/>

  <!-- Petites particules -->
  <circle cx="40" cy="40" r="3" fill="#FFB74D" fill-opacity="0.6"/>
  <circle cx="370" cy="40" r="3" fill="#006837" fill-opacity="0.5"/>
  <circle cx="50" cy="270" r="3.5" fill="#D97700" fill-opacity="0.4"/>
  <circle cx="365" cy="265" r="3" fill="#FFB74D" fill-opacity="0.5"/>

  <!-- Logo ExamBoost au centre -->
  <g transform="translate(200, 150)">
    <!-- Cercle de fond vert Togo -->
    <circle cx="0" cy="0" r="40" fill="url(#logoBg)"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.25"/>
    <!-- Étoile -->
    <polygon points="0,-26 3,-18 12,-18 5,-13 7,-5 0,-10 -7,-5 -5,-13 -12,-18 -3,-18" fill="#FFB74D"/>
    <!-- Mortarboard -->
    <polygon points="0,-10 18,0 0,10 -18,0" fill="url(#logoCap)"/>
    <path d="M -8,4 Q -8,12 0,14 Q 8,12 8,4" fill="#A85200"/>
    <path d="M 18,0 Q 21,4 20,12" stroke="#FFB74D" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="13" r="1.8" fill="#FFB74D"/>
    <!-- Livre ouvert -->
    <path d="M 0,16 L -16,20 L -16,28 Q -8,30 0,28 Z" fill="#FFFFFF"/>
    <path d="M 0,16 L 16,20 L 16,28 Q 8,30 0,28 Z" fill="#FFFFFF"/>
    <line x1="-12" y1="23" x2="-4" y2="24" stroke="#006837" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="4" y1="24" x2="12" y2="23" stroke="#006837" stroke-width="0.7" stroke-opacity="0.6"/>
    <!-- Monogramme -->
    <text x="0" y="36" font-family="Outfit, Inter, Arial, sans-serif" font-size="5" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">EB</text>
  </g>

  <!-- Matière 1 : MATHS (haut, angle -90°) — position (200, 30) -->
  <g transform="translate(200, 30)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#006837" stroke-width="2"/>
    <circle cx="0" cy="0" r="32" fill="#006837" fill-opacity="0.08"/>
    <!-- Symbole racine carrée -->
    <path d="M -10,-2 L -5,-2 L 0,10 L 8,-12" stroke="#006837" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="2" y1="-12" x2="12" y2="-12" stroke="#006837" stroke-width="2.4" stroke-linecap="round"/>
    <text x="0" y="22" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" font-weight="700" fill="#006837" text-anchor="middle">MATHS</text>
  </g>

  <!-- Matière 2 : FRANÇAIS (haut droite, angle -30°) — position (300, 92) -->
  <g transform="translate(300, 92)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#006837" stroke-width="2"/>
    <circle cx="0" cy="0" r="32" fill="#006837" fill-opacity="0.08"/>
    <!-- Livre ouvert -->
    <path d="M -14,-6 L 0,-10 L 14,-6 L 14,8 L 0,12 L -14,8 Z" fill="#4CAF7A"/>
    <line x1="0" y1="-10" x2="0" y2="12" stroke="#FFFFFF" stroke-width="1.2"/>
    <line x1="-10" y1="-2" x2="-3" y2="-3.5" stroke="#FFFFFF" stroke-width="0.8"/>
    <line x1="-10" y1="2" x2="-3" y2="0.5" stroke="#FFFFFF" stroke-width="0.8"/>
    <line x1="3" y1="-3.5" x2="10" y2="-2" stroke="#FFFFFF" stroke-width="0.8"/>
    <line x1="3" y1="0.5" x2="10" y2="2" stroke="#FFFFFF" stroke-width="0.8"/>
    <text x="0" y="22" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" font-weight="700" fill="#006837" text-anchor="middle">FRANÇAIS</text>
  </g>

  <!-- Matière 3 : SCIENCES (bas droite, angle 30°) — position (300, 208) -->
  <g transform="translate(300, 208)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#006837" stroke-width="2"/>
    <circle cx="0" cy="0" r="32" fill="#006837" fill-opacity="0.08"/>
    <!-- Atome -->
    <circle cx="0" cy="0" r="3" fill="#D97700"/>
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#006837" stroke-width="1.4"/>
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#006837" stroke-width="1.4" transform="rotate(60 0 0)"/>
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#006837" stroke-width="1.4" transform="rotate(-60 0 0)"/>
    <circle cx="14" cy="0" r="1.8" fill="#FFB74D"/>
    <circle cx="-7" cy="12" r="1.8" fill="#FFB74D"/>
    <circle cx="-7" cy="-12" r="1.8" fill="#FFB74D"/>
    <text x="0" y="22" font-family="Outfit, Inter, Arial, sans-serif" font-size="6.5" font-weight="700" fill="#006837" text-anchor="middle">SCIENCES</text>
  </g>

  <!-- Matière 4 : SVT (bas, angle 90°) — position (200, 270) -->
  <g transform="translate(200, 270)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#006837" stroke-width="2"/>
    <circle cx="0" cy="0" r="32" fill="#006837" fill-opacity="0.08"/>
    <!-- Fleur -->
    <circle cx="-6" cy="-5" r="5" fill="#FFB74D"/>
    <circle cx="6" cy="-5" r="5" fill="#FFB74D"/>
    <circle cx="-6" cy="5" r="5" fill="#FFB74D"/>
    <circle cx="6" cy="5" r="5" fill="#FFB74D"/>
    <circle cx="0" cy="0" r="4" fill="#D97700"/>
    <!-- Tige -->
    <line x1="0" y1="10" x2="0" y2="16" stroke="#006837" stroke-width="1.6"/>
    <path d="M 0,13 Q 4,12 6,8" stroke="#006837" stroke-width="1.2" fill="none"/>
    <text x="0" y="22" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" font-weight="700" fill="#006837" text-anchor="middle">SVT</text>
  </g>

  <!-- Matière 5 : HISTOIRE-GEO (bas gauche, angle 150°) — position (100, 208) -->
  <g transform="translate(100, 208)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#006837" stroke-width="2"/>
    <circle cx="0" cy="0" r="32" fill="#006837" fill-opacity="0.08"/>
    <!-- Globe -->
    <circle cx="0" cy="0" r="13" fill="#4CAF7A"/>
    <ellipse cx="0" cy="0" rx="13" ry="5" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="5" ry="13" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#FFFFFF" stroke-width="0.8"/>
    <!-- Continents stylisés -->
    <path d="M -8,-4 Q -4,-6 -2,-3 Q -4,0 -8,-2 Z" fill="#006837"/>
    <path d="M 2,2 Q 6,0 8,4 Q 4,5 2,2 Z" fill="#006837"/>
    <text x="0" y="22" font-family="Outfit, Inter, Arial, sans-serif" font-size="6" font-weight="700" fill="#006837" text-anchor="middle">HIST-GEO</text>
  </g>

  <!-- Matière 6 : ANGLAIS (haut gauche, angle 210°) — position (100, 92) -->
  <g transform="translate(100, 92)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#006837" stroke-width="2"/>
    <circle cx="0" cy="0" r="32" fill="#006837" fill-opacity="0.08"/>
    <!-- Drapeau UK stylisé (Union Jack simplifié) -->
    <clipPath id="flagClip">
      <rect x="-13" y="-9" width="26" height="18" rx="1.5"/>
    </clipPath>
    <g clip-path="url(#flagClip)">
      <rect x="-13" y="-9" width="26" height="18" fill="#1565C0"/>
      <!-- Croix blanche -->
      <rect x="-2" y="-9" width="4" height="18" fill="#FFFFFF"/>
      <rect x="-13" y="-2" width="26" height="4" fill="#FFFFFF"/>
      <!-- Croix rouge diagonale (Saint Patrick) -->
      <path d="M -13,-9 L 13,9 M 13,-9 L -13,9" stroke="#C62828" stroke-width="2.2"/>
      <!-- Croix rouge verticale/horizontale (Saint George) -->
      <rect x="-1" y="-9" width="2" height="18" fill="#C62828"/>
      <rect x="-13" y="-1" width="26" height="2" fill="#C62828"/>
    </g>
    <text x="0" y="22" font-family="Outfit, Inter, Arial, sans-serif" font-size="7" font-weight="700" fill="#006837" text-anchor="middle">ANGLAIS</text>
  </g>

  <!-- Indicateur étape 5/5 -->
  <g transform="translate(370, 25)">
    <circle cx="0" cy="0" r="14" fill="#006837" stroke="#D97700" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Outfit, Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  </g>
</svg>
