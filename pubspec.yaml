name: examboost_togo
description: "Préparation intelligente aux examens nationaux togolais (BEPC, BAC) avec IA adaptative."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── Navigation ───────────────────────────────────────────────
  go_router: ^13.2.0

  # ─── Gestion d'état ───────────────────────────────────────────
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # ─── Base de données locale (offline-first) ───────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # ─── Réseau et synchronisation ────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ─── UI / Composants visuels ──────────────────────────────────
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # ─── Notifications et alertes ─────────────────────────────────
  flutter_local_notifications: ^17.2.1+2

  # ─── Utilitaires ──────────────────────────────────────────────
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  logger: ^2.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ─── Analytics (auto-hébergé, RGPD-friendly) ──────────────────
  # posthog_flutter: ^4.0.1  # décommenter en production

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/fonts/


    
