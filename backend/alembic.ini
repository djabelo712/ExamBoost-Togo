# Alembic configuration file — ExamBoost Togo
#
# L'URL SQLAlchemy peut etre surchargee par la variable d'env DATABASE_URL
# (voir alembic/env.py). En dev : SQLite local. En prod : PostgreSQL.

[alembic]
# Emplacement du dossier de migrations (relatif au repertoire d'execution)
script_location = alembic

# Template pour les nouveaux fichiers de revision
# script_template = script.py.mako

# Fuseau horaire pour les timestamps de creation de revision
# timezone =

# Longueur max des messages de revision (en commentaire de fichier)
# truncate_slug_length = 40

# URL SQLAlchemy par defaut (dev local). Surchargee par DATABASE_URL en prod.
sqlalchemy.url = sqlite:///./examboost.db

# Format de nommage des revisions : fichier + slug lisible
# file_template = %%(rev)s_%%(slug)s

# Comparaison des types pour autogenerate (compare_type=True est force dans env.py)
# compare_type = true

[post_write_hooks]
# (Reserved pour des hooks futurs : formatage black/isort apres autogenerate)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
